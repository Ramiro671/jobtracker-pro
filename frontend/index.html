<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobTracker Pro</title>
    <script>
      // Decode the path redirect from 404.html (GitHub Pages SPA trick)
      (function(l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = '';
          var query = '';
          params.forEach(function(p) {
            if (p.slice(0, 2) === 'p=') path = p.slice(2).replace(/~and~/g, '&');
            if (p.slice(0, 2) === 'q=') query = '?' + p.slice(2).replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null, l.pathname + (path ? '/' + path : '') + query + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
